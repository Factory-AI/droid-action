name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  prepare:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    outputs:
      comment_id: ${{ steps.prepare.outputs.comment_id }}
      run_code_review: ${{ steps.prepare.outputs.run_code_review }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Prepare
        id: prepare
        uses: Factory-AI/droid-action/prepare@vn/bug-fixes
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true

  code-review:
    needs: prepare
    if: needs.prepare.outputs.run_code_review == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      ACTIONS_STEP_DEBUG: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Code Review
        uses: Factory-AI/droid-action/review@vn/bug-fixes
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          tracking_comment_id: ${{ needs.prepare.outputs.comment_id }}
          output_file: ${{ runner.temp }}/code-review-results.json

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: droid-review-debug-${{ github.run_id }}
          path: |
            ~/.factory/**
            ${{ runner.temp }}/droid-prompts/**
          if-no-files-found: ignore
          retention-days: 7
